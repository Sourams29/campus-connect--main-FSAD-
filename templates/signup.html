<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page</title>
    <link rel="icon" type="image/png" href="image\favicon.ico">

    <style>
        /* Import Poppins font */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        /* General Styles */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #e6e4e4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .signup-container {
            display: flex;
            justify-content: space-between;
            width: 80%;
            max-width: 900px;
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* Image section */
        .signup-image {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signup-image img {
            margin-left: 130px;
            width: 100%;
            object-fit: cover;
        }

        /* Signup form section */
        .signup-form-section {
            width: 50%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .signup-form-section h2 {
            font-size: 32px;
            color: #CD354D;
            margin-bottom: 20px;
            text-align: center;
        }

        .signup-form-section .form-group {
            margin-bottom: 15px;
        }

        .signup-form-section label {
            font-size: 16px;
            color: #3053D3;
            margin-bottom: 5px;
            display: block;
        }

        .signup-form-section input[type="text"],
        .signup-form-section input[type="email"],
        .signup-form-section input[type="password"],
        .signup-form-section select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f7f7f7;
            font-size: 16px;
        }

        .signup-form-section input[type="text"]::placeholder,
        .signup-form-section input[type="email"]::placeholder,
        .signup-form-section input[type="password"]::placeholder {
            color: #aaa;
        }

        .signup-form-section input[type="submit"] {
            width: 105%;
            background-color: #3053D3;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .signup-form-section input[type="submit"]:hover {
            background-color: #0037ff;
        }

        .signup-form-section .login-link {
            margin-top: 10px;
            font-size: 14px;
            color: #3053D3;
            cursor: pointer;
            text-align: center;
        }

        .signup-form-section .login-link a {
            text-decoration: none;
            color: inherit;
        }

        .signup-form-section .login-link a:hover {
            color: #0037ff;
        }

        /* Error message styling */

        #error-message {
            color: red;
            /* Red color for the error text */
            background-color: #f8d7da;
            /* Light red background for error */
            border: 1px solid #f5c6cb;
            /* Red border */
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            /* Initially hidden */
            z-index: 1000;
            /* Ensure it appears above other content */
            position: absolute;
            /* Position it absolutely, so it doesn't affect layout */
            /* margin-top: -50px; */
            margin-left: 60px;
            margin-bottom: 29%;
            margin-right: 53%;
        }

        /* Responsive design for smaller screens */
        @media (max-width: 768px) {
            .signup-container {
                flex-direction: column;
            }

            .signup-image {
                width: 100%;
                height: 200px;
            }

            .signup-form-section {
                width: 80%;
                padding: 20px;
            }

            .signup-form-section input[type="submit"] {
                padding: 0px;
            }
        }

        .back-svg {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            /* Space between SVG and header title */
        }

        .signup-form-section {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .back-svg svg {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .back-svg svg:hover {
            cursor: pointer;
            opacity: 0.8;
        }
    </style>
    <script>
        // Prefill email if present in the URL or local storage
        window.addEventListener('load', function () {
            prefillEmail();  // Prefill email on page load
            toggleIdField();
        });

        function prefillEmail() {
            const urlParams = new URLSearchParams(window.location.search);
            const emailFromURL = urlParams.get('email');
            const emailFromStorage = localStorage.getItem('email');

            const emailField = document.getElementById('email');
            if (emailFromURL) {
                emailField.value = emailFromURL;
                emailField.readOnly = true; // Optional, makes the field read-only
                localStorage.setItem('email', emailFromURL);  // Store email in localStorage
            } else if (emailFromStorage) {
                emailField.value = emailFromStorage;
            }
        }

        // Handle signup error and check for duplicate credentials
        async function handleSignupError() {
            const errorDiv = document.getElementById('signup-error');
            const name = document.getElementById('name').value;
            const prn = document.getElementById('prn').value;
            const facultyId = document.getElementById('faculty_id').value;
            const eventId = document.getElementById('event_id').value;
            const category = document.getElementById('category').value;
            const email = document.getElementById('email').value;

            let id;
            if (category === 'student') {
                id = prn;
            } else if (category === 'faculty') {
                id = facultyId;
            } else if (category === 'event_manager') {
                id = eventId;
            }

            const isDuplicate = await checkForDuplicate(name, id, email);

            if (isDuplicate) {
                errorDiv.innerText = 'Credentials are already taken. Please choose another.';
                return false;
            }

            errorDiv.innerText = '';
            return true;
        }

        async function checkForDuplicate(name, id, email) {
            const response = await fetch('/check-duplicate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ name, id, email }),
            });

            const data = await response.json();
            return data.isDuplicate;
        }

        function toggleIdField() {
            const category = document.getElementById('category').value;
            const prnField = document.getElementById('prn-field');
            const facultyIdField = document.getElementById('faculty_id-field');
            const eventIdField = document.getElementById('event_id-field');

            prnField.style.display = 'none';
            facultyIdField.style.display = 'none';
            eventIdField.style.display = 'none';

            if (category === 'student') {
                prnField.style.display = 'block';
            } else if (category === 'faculty') {
                facultyIdField.style.display = 'block';
            } else if (category === 'event_manager') {
                eventIdField.style.display = 'block';
            }
        }

        function showLoginForm() {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body>
    <div class="signup-container">
        <!-- Left-side image -->
        <div class="signup-image">
            <img src="/image/image.png" alt="">
        </div>

        <!-- Right-side signup form -->
        <div class="signup-form-section">
            <div class="back-svg">
                <a href="Home.html"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                        color="#000000" fill="none">
                        <path
                            d="M8.9995 22L8.74887 18.4911C8.61412 16.6046 10.1082 15 11.9995 15C13.8908 15 15.3849 16.6046 15.2501 18.4911L14.9995 22"
                            stroke="currentColor" stroke-width="1.5" />
                        <path
                            d="M2.35157 13.2135C1.99855 10.9162 1.82204 9.76763 2.25635 8.74938C2.69065 7.73112 3.65421 7.03443 5.58132 5.64106L7.02117 4.6C9.41847 2.86667 10.6171 2 12.0002 2C13.3832 2 14.5819 2.86667 16.9792 4.6L18.419 5.64106C20.3462 7.03443 21.3097 7.73112 21.744 8.74938C22.1783 9.76763 22.0018 10.9162 21.6488 13.2135L21.3478 15.1724C20.8473 18.4289 20.5971 20.0572 19.4292 21.0286C18.2613 22 16.5538 22 13.139 22H10.8614C7.44652 22 5.73909 22 4.57118 21.0286C3.40327 20.0572 3.15305 18.4289 2.65261 15.1724L2.35157 13.2135Z"
                            stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />

                    </svg> </a>
                 </div>
                <h2>Signup</h2>
                <div id="error-message"></div>
                <form class="signup-form" action="/signup" method="POST" onsubmit="return handleSignupError();">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group" style="width: 105%;">
                        <label for="category">Category:</label>
                        <select id="category" name="category" onchange="toggleIdField()" required>
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                            <option value="event_manager">Event Manager</option>
                        </select>
                    </div>
                    <div id="prn-field" class="form-group" style="display:none;">
                        <label for="prn">PRN:</label>
                        <input type="text" id="prn" name="prn" placeholder="Enter your PRN">
                    </div>
                    <div id="faculty_id-field" class="form-group" style="display:none;">
                        <label for="faculty_id">Faculty ID:</label>
                        <input type="text" id="faculty_id" name="faculty_id" placeholder="Enter your Faculty ID">
                    </div>
                    <div id="event_id-field" class="form-group" style="display:none;">
                        <label for="event_id">Event ID:</label>
                        <input type="text" id="event_id" name="event_id" placeholder="Enter your Event ID">
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <div class="form-group">
                        <input type="submit" value="Signup">
                    </div>
                    <div class="login-link">
                        Already have an account? <a href="login.html" onclick="showLoginForm()">Login</a>
                    </div>
                </form>
            </div>
        </div>

        <script>
            // Show error messages from URL if present
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');

            if (error) {
                const errorMessageElement = document.getElementById('error-message');
                errorMessageElement.textContent = decodeURIComponent(error.replace(/\+/g, ' '));
                errorMessageElement.style.display = 'block'; // Show the error message
                console.log('Error from URL: ' + error);

                // Hide the error message after 3 seconds
                setTimeout(() => {
                    errorMessageElement.style.display = 'none'; // Hide the error message
                }, 3000); // 3000 milliseconds = 3 seconds
            }
        </script>
</body>

</html>
